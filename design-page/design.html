<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" src="/code/promise-feat/src/css/design.css">
  <title></title>
</head>
<body>

  <img src="/ads/" alt="">
  <h1>Customize Your Shoe 👟</h1>

  <!-- Shoe Preview -->
  <div>
    <p>[ Shoe Preview Here ]</p>
  </div>

  <!-- Color Selection -->
  <div>
    <h3>Select Color</h3>
    <button>Black</button>
    <button>Red</button>
    <button>Blue</button>
    <button>White</button>
  </div>

  <!-- Size Selection -->
  <div>
    <h3>Select Size</h3>
    <button>38</button>
    <button>39</button>
    <button>40</button>
    <button>41</button>
    <button>42</button>
  </div>

  <!-- Shoe Parts (Optional Advanced Section) -->
  <div>
    <h3>Customize Parts</h3>

    <label>Sole Color:</label>
    <select>
      <option>Black</option>
      <option>White</option>
      <option>Red</option>
    </select>

    <br><br>

    <label>Laces Color:</label>
    <select>
      <option>Black</option>
      <option>White</option>
      <option>Blue</option>
    </select>
  </div>

  <!-- Quantity -->
  <div>
    <h3>Quantity</h3>
    <input type="number" value="1" min="1">
  </div>

  <!-- Add to Cart -->
  <div>
    <button>Add to Cart</button>
  </div>

</body>
</html>
